<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${participanteDto.id == null ? 'Novo Participante' : 'Editar Participante'}">Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 th:text="${participanteDto.id == null ? 'Novo Participante' : 'Editar Participante'}">Formulário</h2>
    <hr>

    <form th:action="@{/participantes/salvar}" th:object="${participanteDto}" method="POST" class="col-md-6">
        <input type="hidden" th:field="*{id}">
        
        <div class="mb-3">
            <label for="nome" class="form-label">Nome:</label>
            <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
        </div>

        <div class="mb-3">
            <label for="senha" class="form-label">Senha:</label>
            <input type="password" th:field="*{senha}" class="form-control" id="senha" required>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Salvar</button>
            <a th:href="@{/participantes}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>

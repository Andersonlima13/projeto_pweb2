<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Participantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Participantes</h2>
        <a th:href="@{/participantes/novo}" class="btn btn-primary">Novo Participante</a>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nome</th>
                <th>ID</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="participante : ${participantes}">
                <td th:text="${participante.nome}">Nome</td>
                <td th:text="${participante.id}">ID</td>
                <td>
                    <a th:href="@{/participantes/editar/{id}(id=${participante.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/participantes/apagar/{id}(id=${participante.id})}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('Tem certeza que deseja excluir?')">Excluir</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(participantes)}">
                <td colspan="3" class="text-center">Nenhum participante cadastrado.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${corridaDto.id == null ? 'Nova Corrida' : 'Editar Corrida'} + ' - Projeto Corridas'">Formulário de Corrida</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/corridas.css}">
</head>
<body>
    <nav class="navbar-custom">
        <a th:href="@{/lobby}" class="navbar-brand-custom">
            <i class="bi bi-code-slash"></i> Corridas de programação
        </a>
        <div class="d-flex align-items-center">
            <a th:href="@{/auth/logout}" class="btn-logout" onclick="return confirm('Deseja sair?')">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </nav>

    <div class="breadcrumb-trail">
        <a th:href="@{/lobby}">Lobby</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/corridas}">Corridas</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${corridaDto.id == null ? 'Nova corrida' : 'Editar corrida'}">Nova corrida</span>
    </div>

    <div class="corrida-form-page">
        <div class="corrida-form-alert" th:if="${erro}">
            <span th:text="${erro}"></span>
        </div>

        <div class="page-header">
            <div class="header-title">
                <h1 th:text="${corridaDto.id == null ? 'Criar nova corrida' : 'Editar corrida'}">Criar nova corrida</h1>
                <p>Preencha os dados abaixo para publicar a corrida.</p>
            </div>
        </div>

        <div class="corrida-form-shell">
            <div class="corrida-form-header">
                <h2>Detalhes da Corrida</h2>
                <p>O formulário está centralizado e segue o mesmo padrão visual da listagem.</p>
            </div>

            <form th:action="@{/corridas}" method="POST" th:object="${corridaDto}">
                <div class="corrida-form-group">
                    <label for="titulo">Título</label>
                    <input type="text" class="corrida-form-input" id="titulo"
                           th:field="*{titulo}" placeholder="Digite o título da corrida" required>
                </div>

                <div class="corrida-form-group">
                    <label for="descricao">Descrição</label>
                    <textarea class="corrida-form-textarea" id="descricao" rows="5"
                              th:field="*{descricao}" placeholder="Digite a descrição da corrida"></textarea>
                </div>

                <div class="corrida-form-actions">
                    <button type="submit" class="corrida-form-btn-primary">Salvar Corrida</button>
                    <a th:href="@{/corridas}" class="corrida-form-btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

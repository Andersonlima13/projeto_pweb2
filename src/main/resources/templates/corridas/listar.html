<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Corridas - Projeto Corridas</title>
    <!-- Add Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/corridas.css}">
</head>
<body>
    <nav class="navbar-custom">
        <a th:href="@{/lobby}" class="navbar-brand-custom">
            <i class="bi bi-code-slash"></i> Corridas de programação
        </a>
        <div class="d-flex align-items-center">
            <a th:href="@{/auth/logout}" class="btn-logout" onclick="return confirm('Deseja sair?')">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </nav>

    <div class="breadcrumb-trail">
        <a th:href="@{/lobby}">Lobby</a>
        <i class="bi bi-chevron-right"></i>
        <span>Corridas</span>
    </div>

    <!-- Mensagens -->
    <div style="max-width: 1200px; margin: 1rem auto; padding: 0 1rem;">
        <div style="background-color: #d4edda; color: #155724; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;" th:if="${mensagem}">
            <span th:text="${mensagem}"></span>
        </div>
        <div style="background-color: #f8d7da; color: #721c24; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;" th:if="${erro}">
            <span th:text="${erro}"></span>
        </div>
    </div>



    <!-- Header Section -->
    <div class="page-header">
        <div class="header-title">
            <h1>Gerenciar corridas</h1>
            <p>Clique em uma corrida para acessar seus detalhes.</p>
        </div>
        <a th:href="@{/corridas/novo}" class="btn-new">
            <i class="bi bi-plus-lg"></i> Nova corrida
        </a>
    </div>

    <!-- Grid de Corridas -->
    <div class="corridas-grid" th:if="${corridas.size() > 0}">
        <a th:each="corrida : ${corridas}" th:href="@{/corridas/{id}/perguntas(id=${corrida.id})}" class="card-corrida">
            <div class="card-top">
                <span class="card-id">ID: <span th:text="${#strings.substring(corrida.id.toString(), 0, 8)}"></span></span>
               
            </div>
            <div class="card-body-custom">
                <h3 th:text="${corrida.titulo}">Título da Corrida</h3>
                <p th:text="${corrida.descricao}">Descrição...</p>
            </div>
            <div class="card-footer-custom">
                <span class="questions-count">
                    <i class="bi bi-question-circle-fill"></i> 
                </span>
                <i class="bi bi-chevron-right arrow"></i>
            </div>
        </a>
    </div>

    <!-- Empty State -->
    <div class="empty-state" th:if="${corridas.size() == 0}">
        <h2>Nenhuma corrida cadastrada</h2>
        <p>Clique no botão "Nova corrida" para criar sua primeira corrida.</p>
    </div>

</body>
</html>

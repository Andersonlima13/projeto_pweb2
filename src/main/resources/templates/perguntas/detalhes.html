<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pergunta - Projeto Corridas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}">Corrida</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}">Perguntas</a>
                </li>
                <li class="breadcrumb-item active">Detalhes</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Pergunta</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label"><strong>Enunciado:</strong></label>
                            <p class="form-control-plaintext text-break" th:text="${pergunta.enunciado}">Enunciado</p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Respostas corretas:</strong></label>
                            <p class="form-control-plaintext" th:text="${pergunta.respostaCorreta}">0</p>
                        </div>

                        <div class="mb-3" th:if="${!#lists.isEmpty(pergunta.alternativas)}">
                            <label class="form-label"><strong>Alternativas:</strong></label>
                            <div class="list-group">
                                <div class="list-group-item d-flex justify-content-between align-items-center"
                                     th:each="alternativa : ${pergunta.alternativas}">
                                    <span th:text="${alternativa.descricao}">Alternativa</span>
                                    <span class="badge"
                                          th:classappend="${alternativa.isCorreta} ? ' bg-success' : ' bg-secondary'"
                                          th:text="${alternativa.isCorreta} ? 'Correta' : 'Incorreta'">Status</span>
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-info" th:if="${#lists.isEmpty(pergunta.alternativas)}">
                            Nenhuma alternativa cadastrada para esta pergunta.
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0">Ações</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a th:href="@{/corridas/{corridaId}/perguntas/editar/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                               class="btn btn-warning">Editar</a>
                            <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/alternativas(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                               class="btn btn-outline-primary">Alternativas</a>
                            <a th:href="@{/corridas/{corridaId}/perguntas/apagar/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                               class="btn btn-danger"
                               onclick="return confirm('Tem certeza que deseja excluir esta pergunta?')">Excluir</a>
                            <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}"
                               class="btn btn-secondary">Voltar à Lista</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

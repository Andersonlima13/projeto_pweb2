<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pergunta - Projeto Corridas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item"><a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}"></a></li>
                <li class="breadcrumb-item"><a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}">Perguntas</a></li>
                <li class="breadcrumb-item active">Pergunta</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Pergunta</h5>
                    </div>
                    <div class="card-body">
                        <!-- ID -->
                        <div class="mb-3">
                            <label class="form-label"><strong>ID:</strong></label>
                            <p class="form-control-plaintext" th:text="${pergunta.id}"></p>
                        </div>

                        <!-- Enunciado -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Enunciado:</strong></label>
                            <p class="form-control-plaintext text-break" th:text="${pergunta.enunciado}"></p>
                        </div>

                        <!-- Resposta Correta -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Resposta Correta (alternativa):</strong></label>
                            <p class="form-control-plaintext" th:text="${pergunta.respostaCorreta}"></p>
                        </div>

                        <!-- Alternativas -->
                        <div class="mb-3" th:if="${pergunta.alternativas != null and pergunta.alternativas.size() > 0}">
                            <label class="form-label"><strong>Alternativas:</strong></label>
                            <div class="list-group">
                                <div class="list-group-item" th:each="alternativa : ${pergunta.alternativas}">
                                    <h6 class="mb-2" th:text="${alternativa.descricao}"></h6>
                                    <span class="badge" 
                                          th:classappend="${alternativa.isCorreta} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${alternativa.isCorreta} ? 'Correta' : 'Incorreta'"></span>
                                </div>
                            </div>
                        </div>

                        <div th:if="${pergunta.alternativas == null or pergunta.alternativas.size() == 0}" class="alert alert-info">
                            Nenhuma alternativa cadastrada para esta pergunta.
                        </div>
                    </div>
                </div>
            </div>

            <!-- Painel de Ações -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0">Ações</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/editar(corridaId=${corrida.id}, perguntaId=${pergunta.id})}" 
                               class="btn btn-warning">Editar</a>
                            <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#confirmarDelecao">
                                Deletar
                            </button>
                            <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}" class="btn btn-secondary">Voltar à Lista</a>
                        </div>
                    </div>
                </div>

                <!-- Informações da Corrida -->
                <div class="card mt-3">
                    <div class="card-header bg-info text-white">
                        <h6 class="mb-0">Corrida</h6>
                    </div>
                    <div class="card-body">
                        <p><strong th:text="${corrida.titulo}"></strong></p>
                        <p class="mb-0"><small class="text-muted" th:text="${corrida.descricao}"></small></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação de Deleção -->
    <div class="modal fade" id="confirmarDelecao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Deleção</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Você tem certeza que deseja deletar esta pergunta?
                    <p class="mt-3 mb-0"><small class="text-muted">Esta ação não pode ser desfeita.</small></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <form th:action="@{/corridas/{corridaId}/perguntas/{perguntaId}/deletar(corridaId=${corrida.id}, perguntaId=${pergunta.id})}" method="POST" style="display: inline;">
                        <button type="submit" class="btn btn-danger">Deletar Pergunta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

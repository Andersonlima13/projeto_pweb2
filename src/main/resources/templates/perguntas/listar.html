<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${corrida.titulo} + ' - Perguntas'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item"><a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}"></a></li>
                <li class="breadcrumb-item active">Perguntas</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 th:text="${corrida.titulo}"></h1>
                <p class="text-muted" th:text="${corrida.descricao}"></p>
            </div>
            <a th:href="@{/corridas/{corridaId}/perguntas/novo(corridaId=${corrida.id})}" class="btn btn-primary">+ Nova Pergunta</a>
        </div>

        <!-- Tabela de Perguntas -->
        <div class="table-responsive">
            <table class="table table-striped table-hover" th:if="${perguntas.size() > 0}">
                <thead class="table-dark">
                    <tr>
                        <th>Enunciado</th>
                        <th>Resposta Correta</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pergunta : ${perguntas}">
                        <td>
                            <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}" 
                               th:text="${pergunta.enunciado}"></a>
                        </td>
                        <td th:text="${pergunta.respostaCorreta}"></td>
                        <td>
                            <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/editar(corridaId=${corrida.id}, perguntaId=${pergunta.id})}" 
                               class="btn btn-sm btn-warning">Editar</a>
                            <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal" 
                                    th:data-bs-target="'#confirmarDelecao' + ${pergunta.id}">
                                Deletar
                            </button>

                            <!-- Modal de Confirmação de Deleção -->
                            <div class="modal fade" th:id="'confirmarDelecao' + ${pergunta.id}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title">Confirmar Deleção</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                        </div>
                                        <div class="modal-body">
                                            Você tem certeza que deseja deletar a pergunta <strong th:text="${pergunta.enunciado}"></strong>?
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                            <form th:action="@{/corridas/{corridaId}/perguntas/{perguntaId}/deletar(corridaId=${corrida.id}, perguntaId=${pergunta.id})}" method="POST" style="display: inline;">
                                                <button type="submit" class="btn btn-danger">Deletar</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Mensagem quando não há perguntas -->
        <div class="alert alert-info" th:if="${perguntas.size() == 0}">
            Nenhuma pergunta cadastrada para esta corrida. <a th:href="@{/corridas/{corridaId}/perguntas/novo(corridaId=${corrida.id})}">Clique aqui</a> para criar uma.
        </div>

        <hr>
        <div class="mt-4">
            <a th:href="@{/corridas/{id}(id=${corrida.id})}" class="btn btn-secondary">Voltar aos Detalhes</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

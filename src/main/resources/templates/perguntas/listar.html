<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${corrida.titulo} + ' - Perguntas'">Perguntas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}">Corrida</a>
                </li>
                <li class="breadcrumb-item active">Perguntas</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-1" th:text="${corrida.titulo}">Corrida</h1>
                <p class="text-muted mb-0" th:text="${corrida.descricao}">Descrição</p>
            </div>
            <a th:href="@{/corridas/{corridaId}/perguntas/novo(corridaId=${corrida.id})}" class="btn btn-primary">
                Nova Pergunta
            </a>
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(perguntas)}">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Enunciado</th>
                        <th>Respostas corretas</th>
                        <th>Alternativas</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pergunta : ${perguntas}">
                        <td>
                            <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                               th:text="${pergunta.enunciado}">Pergunta</a>
                        </td>
                        <td th:text="${pergunta.respostaCorreta}">0</td>
                        <td th:text="${pergunta.alternativas != null ? pergunta.alternativas.size() : 0}">0</td>
                        <td>
                            <div class="d-flex flex-wrap gap-2">
                                <a th:href="@{/corridas/{corridaId}/perguntas/editar/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                                   class="btn btn-sm btn-warning">Editar</a>
                                <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/alternativas(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                                   class="btn btn-sm btn-outline-primary">Alternativas</a>
                                <a th:href="@{/corridas/{corridaId}/perguntas/apagar/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Tem certeza que deseja excluir esta pergunta?')">Excluir</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="alert alert-info" th:if="${#lists.isEmpty(perguntas)}">
            Nenhuma pergunta cadastrada para esta corrida.
        </div>

        <a th:href="@{/corridas/{id}(id=${corrida.id})}" class="btn btn-secondary">Voltar aos Detalhes</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

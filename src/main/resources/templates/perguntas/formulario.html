<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${acao} + ' Pergunta - Projeto Corridas'">Pergunta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}">Corrida</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}">Perguntas</a>
                </li>
                <li class="breadcrumb-item active" th:text="${acao}">Ação</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0" th:text="${acao} + ' Pergunta'">Pergunta</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/corridas/{corridaId}/perguntas/salvar(corridaId=${corrida.id})}"
                              th:object="${perguntaDto}" method="POST">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{corridaId}">
                            <input type="hidden" th:field="*{respostaCorreta}" id="respostaCorreta">

                            <div class="mb-4">
                                <label for="enunciado" class="form-label">Enunciado</label>
                                <textarea class="form-control" id="enunciado" rows="4"
                                          th:field="*{enunciado}" required></textarea>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h6 class="mb-0">Alternativas</h6>
                                    <span class="text-muted small">Respostas corretas: <span id="contadorCorretas">0</span></span>
                                </div>
                                <button type="button" class="btn btn-outline-primary btn-sm" id="adicionarAlternativa">
                                    Adicionar Alternativa
                                </button>
                            </div>

                            <div id="alternativas">
                                <div class="border rounded p-3 mb-3 alternativa-item"
                                     th:each="alternativa, stat : *{alternativas}">
                                    <input type="hidden" th:field="*{alternativas[__${stat.index}__].id}">
                                    <input type="hidden" th:field="*{alternativas[__${stat.index}__].perguntaId}">

                                    <div class="mb-3">
                                        <label class="form-label"
                                               th:for="${'alternativaDescricao' + stat.index}">Descrição</label>
                                        <input type="text" class="form-control descricao-alternativa"
                                               th:id="${'alternativaDescricao' + stat.index}"
                                               th:field="*{alternativas[__${stat.index}__].descricao}">
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="form-check mb-0">
                                            <input type="checkbox" class="form-check-input correta-alternativa"
                                                   th:id="${'alternativaCorreta' + stat.index}"
                                                   th:field="*{alternativas[__${stat.index}__].isCorreta}">
                                            <label class="form-check-label"
                                                   th:for="${'alternativaCorreta' + stat.index}">Correta</label>
                                        </div>
                                        <button type="button" class="btn btn-outline-danger btn-sm remover-alternativa">
                                            Remover
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Salvar</button>
                                <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}"
                                   class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.getElementById('alternativas');
            const adicionar = document.getElementById('adicionarAlternativa');
            const respostaCorreta = document.getElementById('respostaCorreta');
            const contadorCorretas = document.getElementById('contadorCorretas');
            let indice = container.querySelectorAll('.alternativa-item').length;

            function atualizarContagem() {
                const corretas = Array.from(container.querySelectorAll('.alternativa-item'))
                    .filter(function (item) {
                        const descricao = item.querySelector('.descricao-alternativa');
                        const correta = item.querySelector('.correta-alternativa');
                        return descricao && descricao.value.trim() !== '' && correta && correta.checked;
                    }).length;

                respostaCorreta.value = corretas;
                contadorCorretas.textContent = corretas;
            }

            function criarAlternativa() {
                const item = document.createElement('div');
                item.className = 'border rounded p-3 mb-3 alternativa-item';
                item.innerHTML = `
                    <input type="hidden" name="alternativas[${indice}].id">
                    <input type="hidden" name="alternativas[${indice}].perguntaId">
                    <div class="mb-3">
                        <label class="form-label" for="alternativaDescricao${indice}">Descrição</label>
                        <input type="text" class="form-control descricao-alternativa"
                               id="alternativaDescricao${indice}" name="alternativas[${indice}].descricao">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input correta-alternativa"
                                   id="alternativaCorreta${indice}" name="alternativas[${indice}].isCorreta" value="true">
                            <label class="form-check-label" for="alternativaCorreta${indice}">Correta</label>
                        </div>
                        <button type="button" class="btn btn-outline-danger btn-sm remover-alternativa">Remover</button>
                    </div>
                `;
                container.appendChild(item);
                indice++;
            }

            adicionar.addEventListener('click', function () {
                criarAlternativa();
                atualizarContagem();
            });

            container.addEventListener('click', function (event) {
                if (!event.target.classList.contains('remover-alternativa')) {
                    return;
                }

                const item = event.target.closest('.alternativa-item');
                if (item) {
                    item.remove();
                    atualizarContagem();
                }
            });

            container.addEventListener('input', atualizarContagem);
            container.addEventListener('change', atualizarContagem);
            atualizarContagem();
        });
    </script>
</body>
</html>

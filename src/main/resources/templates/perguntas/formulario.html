<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${acao} + ' Pergunta - Projeto Corridas'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item"><a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}"></a></li>
                <li class="breadcrumb-item"><a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}">Perguntas</a></li>
                <li class="breadcrumb-item active" th:text="${acao} + ' Pergunta'"></li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0" th:text="${acao} + ' Pergunta - ' + ${corrida.titulo}"></h5>
                    </div>
                    <div class="card-body">
                        <form th:object="${perguntaDto}">
                            <!-- id (oculto para edição) -->
                            <input type="hidden" th:if="${perguntaDto.id != null}" 
                                   th:field="*{id}" />
                            <!-- corridaId (oculto) -->
                            <input type="hidden" th:field="*{corridaId}" />

                            <!-- Enunciado -->
                            <div class="mb-3">
                                <label for="enunciado" class="form-label">Enunciado</label>
                                <textarea class="form-control" id="enunciado" rows="4"
                                          th:field="*{enunciado}" placeholder="Digite o enunciado da pergunta" required></textarea>
                                <small class="form-text text-muted">O texto da pergunta</small>
                            </div>

                            <!-- Resposta Correta -->
                            <div class="mb-3">
                                <label for="respostaCorreta" class="form-label">Resposta Correta (número da alternativa)</label>
                                <input type="number" class="form-control" id="respostaCorreta" 
                                       th:field="*{respostaCorreta}" placeholder="Ex: 1, 2, 3, etc" required min="1">
                                <small class="form-text text-muted">Número da alternativa correta</small>
                            </div>

                            <!-- Botões -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary" th:text="${acao}"></button>
                                <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Instruções -->
                <div class="alert alert-info mt-4">
                    <h6>Informações:</h6>
                    <ul class="mb-0">
                        <li>O enunciado é obrigatório</li>
                        <li>A resposta correta deve ser um número</li>
                        <li>As alternativas serão adicionadas após criar a pergunta</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        // Se for edição, ajustar a action do formulário
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const perguntaId = document.querySelector('input[name="id"]');
            const corridaId = document.querySelector('input[name="corridaId"]').value;
            
            if (perguntaId && perguntaId.value) {
                form.method = 'POST';
                form.action = '[[@{/corridas/}]]' + corridaId + '/perguntas/' + perguntaId.value;
            } else {
                form.method = 'POST';
                form.action = '[[@{/corridas/}]]' + corridaId + '/perguntas';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lobby - Projeto Corridas</title>
    <!-- Add Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/lobby.css}">
</head>
<body>
    <!-- Background geometric shapes -->
    <div class="bg-shape shape-circle"></div>
    <div class="bg-shape shape-circle-2"></div>
    <div class="bg-shape shape-triangle"></div>
    <div class="bg-shape shape-square"></div>

    <nav class="navbar-custom">
        <div class="navbar-brand-custom">
            <i class="bi bi-code-slash"></i> Corridas de programação
        </div>
        <div class="d-flex align-items-center">
            <a th:href="@{/auth/logout}" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </nav>

    <div class="main-content">
        <div class="flash-stack">
            <div class="flash-message flash-error" th:if="${erro}">
                <i class="bi bi-shield-lock"></i>
                <span th:text="${erro}"></span>
            </div>
            <div class="flash-message flash-info" th:if="${restricao}">
                <i class="bi bi-info-circle"></i>
                <span th:text="${restricao}"></span>
            </div>
        </div>

        <h1 class="welcome-text">
            Bem vindo <span th:if="${session.usuarioLogado != null}" th:text="${session.usuarioLogado.nome}">Usuário</span><span th:unless="${session.usuarioLogado != null}">!</span><span th:if="${session.usuarioLogado != null}">!</span>
        </h1>

        <p class="welcome-subtitle" th:if="${session.usuarioLogado != null and !session.usuarioLogado.admin}">
            Você está em modo participante. Apenas o lobby está disponível.
        </p>

        <div class="action-buttons" th:if="${session.usuarioLogado != null and session.usuarioLogado.admin}">
            <a th:href="@{/corridas}" class="btn-action">
                <i class="bi bi-trophy"></i> Gerenciar corridas
            </a>
            <a th:href="@{/participantes}" class="btn-action">
                <i class="bi bi-people"></i> Gerenciar participantes
            </a>
            <a th:href="@{/lobby/participante/ranking}" class="btn-action">
                <i class="bi bi-award"></i> Ranking
            </a>
        </div>

        <div class="lobby-note" th:if="${session.usuarioLogado != null and !session.usuarioLogado.admin}">
            <div class="lobby-note-icon"><i class="bi bi-person"></i></div>
            <div>
                <h2>Acesso de participante</h2>
                <p>As páginas de cadastro e edição ficam reservadas para administradores.</p>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minhas Corridas - Projeto Corridas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/corridas.css}">
    <link rel="stylesheet" th:href="@{/css/participantes.css}">
</head>
<body>
    <nav class="navbar-custom">
        <a th:href="@{/lobby/participante}" class="navbar-brand-custom">
            <i class="bi bi-code-slash"></i> Corridas de programação
        </a>
        <div class="d-flex align-items-center">
            <a th:href="@{/auth/logout}" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </nav>

    <main class="participantes-page">
        <div class="message-stack">
            <div class="message-box message-info" th:if="${participante != null}">
                <span th:text="'Corridas vinculadas a ' + ${participante.nome}"></span>
            </div>
        </div>

        <section class="dashboard-card">
            <h2>Minhas corridas</h2>
            <p>Lista somente as corridas associadas ao seu cadastro.</p>
        </section>

        <div class="corridas-grid" th:if="${!#lists.isEmpty(corridas)}">
            <article class="card-corrida" th:each="corrida : ${corridas}">
                <div class="card-top">
                    <span class="card-id">ID: <span th:text="${#strings.substring(corrida.id.toString(), 0, 8)}"></span></span>
                    <span class="badge-status badge-ativa">Associada</span>
                </div>
                <div class="card-body-custom">
                    <h3 th:text="${corrida.titulo}">Título da corrida</h3>
                    <p th:text="${corrida.descricao}">Descrição da corrida</p>
                </div>
                <div class="card-footer-custom">
                    <span class="questions-count">
                        <i class="bi bi-person-check"></i> Participante vinculado
                    </span>
                    <i class="bi bi-chevron-right arrow"></i>
                </div>
            </article>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(corridas)}">
            <h2>Nenhuma corrida vinculada</h2>
            <p>Seu cadastro ainda não foi associado a uma corrida.</p>
        </div>

        <div class="d-flex justify-content-center mt-4">
            <a th:href="@{/lobby/participante}" class="btn-new">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>
    </main>
</body>
</html>

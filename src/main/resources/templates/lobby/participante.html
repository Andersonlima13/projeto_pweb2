<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lobby do Participante - Projeto Corridas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/lobby.css}">
</head>
<body>
    <div class="bg-shape shape-circle"></div>
    <div class="bg-shape shape-circle-2"></div>
    <div class="bg-shape shape-triangle"></div>
    <div class="bg-shape shape-square"></div>

    <nav class="navbar-custom">
        <div class="navbar-brand-custom">
            <i class="bi bi-code-slash"></i> Corridas de programação
        </div>
        <div class="d-flex align-items-center">
            <a th:href="@{/auth/logout}" class="btn-logout" onclick="return confirm('Deseja sair?')">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </nav>

    <div class="main-content">
        <div class="flash-stack">
            <div class="flash-message flash-info">
                <i class="bi bi-person"></i>
                <span>Área exclusiva do participante.</span>
            </div>
        </div>

        <h1 class="welcome-text">
            Bem vindo <span th:text="${participante.nome}">Usuário</span>!
        </h1>

        <p class="welcome-subtitle">
            Aqui vocêeeeeeeeeeencontra apenas a navegação inicial do participante. A lista de corridas vinculadas fica em uma tela separada.
        </p>

     

        <div class="action-buttons">
            <a th:href="@{/lobby/participante/corridas}" class="btn-action">
                <i class="bi bi-list-check"></i> Ver corridas
            </a>
            <a th:href="@{/lobby/participante/ranking}" class="btn-action">
                <i class="bi bi-award"></i> Ranking
            </a>
      
        </div>

    </div>
</body>
</html>

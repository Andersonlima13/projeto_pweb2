<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ranking - Projeto Corridas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/participantes.css}">
</head>
<body>
    <nav class="navbar-custom">
        <a th:href="@{/lobby/participante}" class="navbar-brand-custom">
            <i class="bi bi-code-slash"></i> Corridas de programação
        </a>
        <div class="d-flex align-items-center">
            <a th:href="@{/auth/logout}" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </nav>

    <main class="participantes-page">
        <div class="breadcrumb-trail">
            <a th:href="@{/lobby/participante}">Lobby</a>
            <i class="bi bi-chevron-right"></i>
            <span>Ranking</span>
        </div>

        <div class="dashboard-card">
            <h2>Ranking de participantes</h2>
            <p>Classificação geral por pontuação acumulada.</p>
        </div>

        <section class="table-card" th:if="${!#lists.isEmpty(ranking)}">
            <div class="table-card-header">
                <div>
                    <h2>Posições</h2>
                    <p>Ordenado do maior para o menor número de pontos.</p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table participants-table mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>Posição</th>
                            <th>Nome</th>
                            <th>Pontos</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="participante, status : ${ranking}">
                            <td>
                                <span class="badge-role badge-role-admin" th:text="${status.index + 1}">1</span>
                            </td>
                            <td>
                                <div class="participant-name" th:text="${participante.nome}">Nome</div>
                            </td>
                            <td>
                                <span class="badge-link badge-link-future" th:text="${participante.pontos != null ? participante.pontos : 0}">0</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="association-card" th:if="${#lists.isEmpty(ranking)}">
            <h2>Nenhum participante cadastrado</h2>
            <p>Assim que houver participantes, o ranking será exibido aqui.</p>
        </section>
    </main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alternativas - Projeto Corridas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Projeto Corridas</span>
            <div class="d-flex">
                <span class="text-white me-3" th:if="${session.usuarioLogado != null}">
                    Bem-vindo, <span th:text="${session.usuarioLogado.nome}"></span>
                </span>
                <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm" onclick="return confirm('Deseja sair?')">Sair</a>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/corridas}">Corridas</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{id}(id=${corrida.id})}" th:text="${corrida.titulo}">Corrida</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{corridaId}/perguntas(corridaId=${corrida.id})}">Perguntas</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}">Pergunta</a>
                </li>
                <li class="breadcrumb-item active">Alternativas</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h1 class="mb-1">Alternativas</h1>
                <p class="text-muted mb-0" th:text="${pergunta.enunciado}">Pergunta</p>
            </div>
            <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/alternativas/novo(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
               class="btn btn-primary">Nova Alternativa</a>
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(alternativas)}">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>DescriĂ§ĂŁo</th>
                        <th>Correta</th>
                        <th>AĂ§Ăµes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="alternativa : ${alternativas}">
                        <td th:text="${alternativa.descricao}">Alternativa</td>
                        <td>
                              <span class="badge"
                                  th:classappend="${alternativa.correta} ? ' bg-success' : ' bg-secondary'"
                                  th:text="${alternativa.correta} ? 'Sim' : 'NĂŁo'">Status</span>
                        </td>
                        <td>
                            <div class="d-flex flex-wrap gap-2">
                                <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/alternativas/editar/{alternativaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id}, alternativaId=${alternativa.id})}"
                                   class="btn btn-sm btn-warning">Editar</a>
                                <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}/alternativas/apagar/{alternativaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id}, alternativaId=${alternativa.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Tem certeza que deseja excluir esta alternativa?')">Excluir</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="alert alert-info" th:if="${#lists.isEmpty(alternativas)}">
            Nenhuma alternativa cadastrada para esta pergunta.
        </div>

        <a th:href="@{/corridas/{corridaId}/perguntas/{perguntaId}(corridaId=${corrida.id}, perguntaId=${pergunta.id})}"
           class="btn btn-secondary">Voltar Ă  Pergunta</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
